<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋牌游戏中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Sans', system-ui;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }
        .header {
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }
        .header h1 {
            font-size: 4rem;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            letter-spacing: 8px;
        }
        .header p {
            font-size: 1.3rem;
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-bottom: 60px;
        }
        .game-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.8s ease-out backwards;
        }
        .game-card:nth-child(1) { animation-delay: 0.2s; }
        .game-card:nth-child(2) { animation-delay: 0.4s; }
        .game-card:nth-child(3) { animation-delay: 0.6s; }
        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
            background: rgba(255,255,255,0.25);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.5);
        }
        .game-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }
        .game-card h3 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .game-card p {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
        }
        .game-card.coming-soon {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .game-card.coming-soon:hover {
            transform: none;
            background: rgba(255,255,255,0.15);
        }
        .coming-soon-badge {
            display: inline-block;
            background: #ff6b6b;
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: 600;
        }
        .footer {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            animation: fadeIn 1s ease-out 1s backwards;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }
            .header p {
                font-size: 1rem;
            }
            .games-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .game-card {
                padding: 30px 20px;
            }
            .game-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 棋牌游戏中心</h1>
            <p>选择您喜欢的游戏，开始精彩对局</p>
        </div>
        <div class="games-grid">
            <div class="game-card" onclick="location.href='mahjong.html'">
                <span class="game-icon">🀄</span>
                <h3>麻将</h3>
                <p>经典四人麻将，支持吃碰杠胡，智能AI对战</p>
            </div>
            <div class="game-card coming-soon">
                <span class="game-icon">🃏</span>
                <h3>斗地主</h3>
                <p>三人斗地主，经典玩法，即将上线</p>
                <span class="coming-soon-badge">即将推出</span>
            </div>
            <div class="game-card coming-soon">
                <span class="game-icon">♠️</span>
                <h3>更多游戏</h3>
                <p>更多精彩棋牌游戏，敬请期待</p>
                <span class="coming-soon-badge">敬请期待</span>
            </div>
        </div>
        <div class="footer">
            © 2024 棋牌游戏中心 · 祝您游戏愉快
        </div>
    </div>
</body>
</html>
